<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Dashboard | Aahaar</title>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #faf7e8;
  color: #333;
  padding: 20px;
}

h2 {
  color: #8b61c0;
}

.topbar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

input, button {
  font-family: inherit;
}

input[type="number"] {
  padding: 8px 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
}

.load-btn {
  background: #8b61c0;
  color: white;
  border: none;
  padding: 9px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}

.load-btn:hover {
  background: #7249a8;
}

.info {
  margin: 8px 0 14px;
  font-size: 14px;
  color: #555;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: #fff;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  border-radius: 8px;
  overflow: hidden;
}

th, td {
  padding: 12px 10px;
  text-align: center;
}

th {
  background-color: #8b61c0;
  color: #fff;
}

tr:nth-child(even) {
  background-color: #f5f0f8;
}

tr:hover {
  background-color: #e0d6f3;
}

button.action {
  padding: 6px 12px;
  margin: 2px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
  color: #fff;
}

.accept {
  background-color: #8b61c0;
}

.accept:hover {
  background-color: #7249a8;
}
</style>
</head>

<body>

<h2>Restaurant Dashboard</h2>

<div class="topbar">
  <label>
    Restaurant ID:
    <input type="number" id="restaurantId" value="1" min="1">
  </label>

  <button class="load-btn" onclick="loadOrders()">Load Orders</button>
</div>

<div class="info" id="dashboardInfo">
  Loading orders...
</div>

<table>
  <thead>
    <tr>
      <th>Order ID</th>
      <th>User</th>
      <th>Total</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="ordersTable">
    <tr><td colspan="5">Loading orders...</td></tr>
  </tbody>
</table>

<script>
const apiBase = "http://127.0.0.1:5000";

async function loadOrders() {
    const restaurantId = document.getElementById("restaurantId").value;
    const tbody = document.getElementById("ordersTable");
    const info = document.getElementById("dashboardInfo");

    if (!restaurantId) {
        info.textContent = "Please enter a restaurant ID.";
        tbody.innerHTML = '<tr><td colspan="5">Please enter a restaurant ID.</td></tr>';
        return;
    }

    try {
        info.textContent = "Loading orders for restaurant " + restaurantId + "...";

        const res = await fetch(`${apiBase}/restaurant/${restaurantId}/orders`);
        const orders = await res.json();

        console.log("Restaurant orders response:", orders);

        tbody.innerHTML = "";

        if (!res.ok) {
            info.textContent = "Could not load orders.";
            tbody.innerHTML = `<tr><td colspan="5">Error: ${orders.error || "Failed to load orders"}</td></tr>`;
            return;
        }

        if (!Array.isArray(orders) || orders.length === 0) {
            info.textContent = "No orders found for restaurant " + restaurantId + ".";
            tbody.innerHTML = '<tr><td colspan="5">No orders yet.</td></tr>';
            return;
        }

        info.textContent = `Showing ${orders.length} order(s) for restaurant ${restaurantId}.`;

        orders.forEach(o => {
            let actionButton = o.order_status || "-";

            if (o.order_status === "Placed" || o.order_status === "Pending") {
                actionButton = `
                    <button class="action accept" onclick="acceptOrder(${restaurantId}, ${o.order_id})">
                        Accept
                    </button>
                `;
            }
            else if (o.order_status === "Accepted") {
                actionButton = `
                    <button class="action accept" onclick="startPreparing(${o.order_id})">
                        Start Preparing
                    </button>
                `;
            }
            else if (o.order_status === "Preparing") {
                actionButton = `
                    <button class="action accept" onclick="markReady(${o.order_id})">
                        Ready for Pickup
                    </button>
                `;
            }

            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${o.order_id}</td>
                <td>${o.customer_name || "-"}</td>
                <td>₹${o.total_amount ?? 0}</td>
                <td>${o.order_status || "-"}</td>
                <td>${actionButton}</td>
            `;

            tbody.appendChild(tr);
        });

    } catch (err) {
        console.error("Restaurant dashboard error:", err);
        info.textContent = "Connection error.";
        tbody.innerHTML = `<tr><td colspan="5">Connection error: ${err.message}</td></tr>`;
    }
}

async function acceptOrder(restaurantId, orderId) {
    try {
        const res = await fetch(`${apiBase}/restaurant/${restaurantId}/orders/${orderId}/accept`, {
            method: "POST"
        });

        const data = await res.json();
        console.log("Accept response:", data);

        if (!res.ok) {
            alert(data.error || "Accept failed");
            return;
        }

        loadOrders();
    } catch (err) {
        console.error("Accept error:", err);
        alert("Could not connect to backend");
    }
}

async function startPreparing(orderId) {
    try {
        const res = await fetch(`${apiBase}/restaurant/orders/${orderId}/prepare`, {
            method: "POST"
        });

        const data = await res.json();
        console.log("Prepare response:", data);

        if (!res.ok) {
            alert(data.error || "Prepare failed");
            return;
        }

        loadOrders();
    } catch (err) {
        console.error("Prepare error:", err);
        alert("Could not connect to backend");
    }
}

async function markReady(orderId) {
    try {
        const res = await fetch(`${apiBase}/restaurant/orders/${orderId}/ready`, {
            method: "POST"
        });

        const data = await res.json();
        console.log("Ready response:", data);

        if (!res.ok) {
            alert(data.error || "Ready for pickup failed");
            return;
        }

        alert("Order marked ready. Assigned to delivery partner " + data.partner_id);
        loadOrders();
    } catch (err) {
        console.error("Ready error:", err);
        alert("Could not connect to backend");
    }
}

loadOrders();
setInterval(loadOrders, 5000);
</script>

</body>
</html>
