<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aahaar Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:320px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#8b61c0;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#8542d6;
}

.message{
    margin-top:15px;
    text-align:center;
    font-size:14px;
}

.register-link{
    margin-top:15px;
    text-align:center;
}

.register-link a{
    text-decoration:none;
    color:#8b61c0;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Aahaar Login</h2>

<label>Phone Number</label> <input type="tel" id="phone" placeholder="Enter your phone number">

<label>Password</label> <input type="password" id="password" placeholder="Enter your password">

<button id="loginBtn">Login</button>

<div id="message" class="message"></div>

<div class="register-link">
    Don't have an account? <a href="register.html">Register</a>
</div>

</div>

<script src="assets/js/login.js"></script>
<script src="assets/js/login_voice.js"></script>
</body>
</html>
