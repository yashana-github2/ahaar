<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Aahaar | Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:"Poppins",sans-serif;
background:#f5f5f7;
padding-bottom:90px;
}

header{
background:#8b61c0;
color:white;
padding:18px 22px;
font-size:18px;
font-weight:600;
}

.section{
background:white;
margin:14px;
padding:18px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.section h3{
margin:0 0 12px;
font-size:15px;
}

.address{
font-size:14px;
color:#555;
line-height:1.6;
}

.row{
display:flex;
justify-content:space-between;
font-size:14px;
margin:6px 0;
}

.total{
font-weight:700;
font-size:16px;
margin-top:10px;
}

.payment-option{
display:flex;
align-items:center;
margin-bottom:12px;
font-size:14px;
}

.payment-option input{
margin-right:10px;
}

.coupon{
color:#8b61c0;
font-weight:500;
cursor:pointer;
font-size:14px;
}

.pay-bar{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:12px;
box-shadow:0 -4px 18px rgba(0,0,0,0.08);
}

.pay-btn{
width:100%;
background:#8b61c0;
color:white;
border:none;
padding:14px;
font-size:16px;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

</style>

</head>

<body>

<header>
Checkout
</header>

<div class="section">
<h3>Delivery Address</h3>
<div class="address" id="deliveryAddress" aria-live="polite">
Loading address...
</div>
</div>

<div class="section">
<h3>Apply Coupon</h3>
<div class="coupon" onclick="applyCoupon()">
+ Apply Promo Code
</div>
</div>

<div class="section">

<h3>Bill Details</h3>

<div class="row">
<span>Item Total</span>
<span>₹<span id="subtotal">0</span></span>
</div>

<div class="row">
<span>GST (5%)</span>
<span>₹<span id="gst">0</span></span>
</div>

<div class="row">
<span>Platform Fee</span>
<span>₹5</span>
</div>

<div class="row">
<span>Delivery Fee</span>
<span>₹30</span>
</div>



<div class="row total">
<span>To Pay</span>
<span>₹<span id="total">0</span></span>
</div>

</div>

<div class="section">

<h3>Payment Method</h3>

<div class="payment-option">
<input type="radio" name="payment" value="UPI" checked>
UPI
</div>

<div class="payment-option">
<input type="radio" name="payment" value="Card">
Card
</div>

<div class="payment-option">
<input type="radio" name="payment" value="COD">
Cash on Delivery
</div>

</div>

<div class="pay-bar">
<button class="pay-btn" id="payBtn" onclick="placeOrder()">
Pay ₹<span id="bottomTotal">0</span>
</button>
</div>

<script>

const API_BASE="http://localhost:5000"

/* -------- LOAD CHECKOUT DATA -------- */

async function loadCheckout(){

try{

const meRes=await fetch(API_BASE+"/me",{credentials:"include"})
const meData=await meRes.json()

if(meData.user){

const u=meData.user

let addressHTML=""

if(u.name) addressHTML+=u.name+"<br>"
if(u.address_line1) addressHTML+=u.address_line1+"<br>"
if(u.address_line2) addressHTML+=u.address_line2+"<br>"
if(u.city) addressHTML+=u.city
if(u.pincode) addressHTML+=" "+u.pincode
addressHTML+="<br>"
if(u.phone_number) addressHTML+=u.phone_number

document.getElementById("deliveryAddress").innerHTML=addressHTML

}else{

document.getElementById("deliveryAddress").innerHTML=
"Please <a href='login.html'>login</a> first"

}

/* -------- LOAD CART -------- */

const cartRes=await fetch(API_BASE+"/cart",{credentials:"include"})
const cart=await cartRes.json()

let subtotal=0

cart.forEach(item=>{

const price=Number(item.price)
const qty=Number(item.quantity)

subtotal+=price*qty

})

const gst = Math.round(subtotal * 0.05);
const delivery = 30;
const platform = 5;
const total = subtotal + gst + delivery + platform;

document.getElementById("subtotal").innerText=subtotal
document.getElementById("gst").innerText=gst
document.getElementById("total").innerText=total
document.getElementById("bottomTotal").innerText=total

}catch(err){

console.error(err)

document.getElementById("deliveryAddress").innerHTML="Error loading checkout."

}

}

/* -------- COUPON -------- */

function applyCoupon(){
alert("Promo system coming soon 😉")
}

/* -------- PLACE ORDER -------- */

async function placeOrder(){

const btn=document.getElementById("payBtn")
btn.disabled=true

try{

const paymentMethod =
document.querySelector('input[name="payment"]:checked').value

const res=await fetch(API_BASE+"/place-order",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

credentials:"include",
body:JSON.stringify({
payment_method:paymentMethod
})

})

const data=await res.json()

if(!res.ok){

alert(data.error||"Failed to place order")
btn.disabled=false
return

}

const orderId=data.order_id

localStorage.setItem("currentOrderId",orderId)

/* Redirect to payment page */

window.location.href=
"payment.html?order_id="+orderId+
"&amount="+data.total_amount

}catch(e){

console.error(e)
alert("Network error")
btn.disabled=false

}

}

loadCheckout()

/* -------- MINIMAL VOICE: ONLY PLACE ORDER -------- */
document.addEventListener("DOMContentLoaded", () => {

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) return;

const recognition = new SpeechRecognition();
recognition.lang = "en-IN";
recognition.continuous = true;
recognition.interimResults = false;

let speaking = false;
let voices = [];

function loadVoices(){
  voices = speechSynthesis.getVoices();
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text){
  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-IN";

  if(voices.length>0){
    utterance.voice =
      voices.find(v=>v.lang.includes("en-IN")) ||
      voices.find(v=>v.lang.includes("en")) ||
      voices[0];
  }

  speaking = true;

  try{ recognition.stop(); }catch(e){}

  utterance.onend = ()=>{
    speaking=false;
    setTimeout(()=>{ try{ recognition.start(); }catch(e){} },400);
  };

  speechSynthesis.speak(utterance);
}

function placeOrderVoice(){
  const btn = document.getElementById("payBtn");

  if(!btn){
    speak("Order button not found.");
    return;
  }

  speak("Placing your order.");
  setTimeout(()=>btn.click(),900);
}

/* -------- VOICE COMMAND -------- */

recognition.onresult = (event)=>{
  const transcript =
    event.results[event.results.length-1][0].transcript
      .toLowerCase()
      .trim();

  console.log("User said:", transcript);

  if(
    transcript.includes("place order") ||
    transcript.includes("confirm order") ||
    transcript.includes("continue")
  ){
    placeOrderVoice();
  }
};

recognition.onerror = ()=>{
  if(!speaking){
    setTimeout(()=>{ try{ recognition.start(); }catch(e){} },800);
  }
};

recognition.onend = ()=>{
  if(!speaking){
    setTimeout(()=>{ try{ recognition.start(); }catch(e){} },800);
  }
};

setTimeout(()=>{
  try{ recognition.start(); }catch(e){}
},800);

setTimeout(() => {
  speak("You are on the checkout page. Say place order to checkout.");
}, 1400);
});

</script>

</body>
</html>
