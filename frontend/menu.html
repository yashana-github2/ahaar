<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aahaar | Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:"Poppins",sans-serif;
background:#faf7e8;
}

header{
padding:20px;
background:#8b61c0;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.menu-category{
margin-bottom:30px;
}

.menu-category h2{
border-bottom:1px solid #ddd;
padding-bottom:6px;
}

.menu-item{
display:flex;
justify-content:space-between;
background:white;
padding:16px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.12);
}

.menu-left{
display:flex;
gap:10px;
align-items:flex-start;
}

.menu-right{
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.menu-right img{
width:150px;
height:130px;
object-fit:cover;
border-radius:12px;
}

button{
border:none;
cursor:pointer;
}

.add-btn{
background:#8b61c0;
color:white;
padding:6px 18px;
border-radius:10px;
}


.qty-box{
display:flex;
gap:10px;
align-items:center;
}

.qty-box button{
background:#eee;
padding:4px 10px;
border-radius:6px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
margin-top:6px;
}

.veg{background:green;}
.nonveg{background:red;}

.veg-toggle{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
justify-content:flex-end;
}

/* toggle */

.switch{
position:relative;
width:44px;
height:24px;
display:inline-block;
}

.switch input{
opacity:0;
}

.slider{
position:absolute;
inset:0;
background:#ccc;
border-radius:24px;
}

.slider:before{
content:"";
position:absolute;
height:18px;
width:18px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:.3s;
}

.switch input:checked + .slider{
background:#8b61c0;
}

.switch input:checked + .slider:before{
transform:translateX(20px);
}

/* Floating buttons */

.menu-fab,
.cart-fab{
position:fixed;
right:20px;
padding:14px 18px;
border-radius:30px;
font-size:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
z-index:1000;
}

.menu-fab{
bottom:20px;
background:#8b61c0;
color:white;
}

.cart-fab{
bottom:70px;
background:white;
color:#8b61c0;
border:2px solid #8b61c0;
}

.menu-drawer{
position:fixed;
bottom:120px;
right:20px;
width:220px;
background:white;
border-radius:14px;
padding:14px;
box-shadow:0 14px 30px rgba(0,0,0,0.2);
display:none;
z-index:999;
}

.menu-drawer button{
width:100%;
text-align:left;
padding:10px;
border:none;
background:none;
cursor:pointer;
border-radius:8px;
}

.menu-drawer button:hover{
background:#f4f4f4;
}

</style>
</head>

<body>

<header>
<h1 id="restaurantName">Restaurant</h1>


</header>

<div class="container">

<div class="veg-toggle">
<span>Veg only</span>

<label class="switch">
<input type="checkbox" id="vegToggle">
<span class="slider"></span>
</label>

</div>

<div id="menuItems"></div>

</div>

<button class="menu-fab" onclick="toggleMenuDrawer()">☰ Menu</button>
<button class="cart-fab" onclick="goToCart()">🛒 Cart</button>

<div class="menu-drawer" id="menuDrawer">
<h3>Jump to</h3>
<div id="menuCategories"></div>
</div>

<script src="assets/js/menu.js"></script>
<script src="assets/js/menu_voice.js"></script>

</body>
</html>
